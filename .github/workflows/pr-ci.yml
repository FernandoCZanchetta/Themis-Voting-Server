name: CI for PRs

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
    - uses: actions/checkout@v4

    - name: Add generic PRISMA_DATABASE_URL to GITHUB_ENV
      run: echo "PRISMA_DATABASE_URL = postgresql://user:pass@localhost:5432/db" >> $GITHUB_ENV

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - run: npm ci

    - name: Generate Prisma Client (ESLint Happy Now!)
      run: npx prisma generate

    - run: npm run lint
